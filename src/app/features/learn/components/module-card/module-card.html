<mat-card class="module-card">
  <mat-card-header>
    <mat-icon mat-card-avatar color="primary">{{ module.icon }}</mat-icon>
    <mat-card-title>{{ module.title }}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <p class="mat-body-1">{{ module.shortDescription }}</p>
  </mat-card-content>
  <mat-card-actions>
    <a mat-flat-button color="primary" [routerLink]="['/learn', module.id]">Start Module</a>
  </mat-card-actions>
</mat-card>
