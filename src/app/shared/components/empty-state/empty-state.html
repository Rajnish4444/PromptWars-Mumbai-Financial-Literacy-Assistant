<div class="empty-container">
  <mat-icon color="primary" class="empty-icon">{{ icon }}</mat-icon>
  <h2 class="mat-headline-3">{{ title }}</h2>
  <p class="mat-body-1">{{ message }}</p>
  
  @if (actionText) {
    <button mat-flat-button color="primary" (click)="action.emit()">
      {{ actionText }}
    </button>
  }
</div>
